appId: com.anonymous.mobile
name: "Auth - Logout"
---

# Seed family
- runScript:
    file: ../../../../scripts/e2e-helpers.js
    env:
      ACTION: seed-family

# Restart app
- launchApp

# Wait for app to finish loading (either Welcome or Home will appear)
- waitForAnimationToEnd:
    timeout: 10000

# If a previous test left a token, we end up on Home — logout first
- runFlow:
    when:
      visible:
        id: "home.screen"
    file: ../shared/do-logout.yaml

# Now we should be on Welcome
- extendedWaitUntil:
    visible:
      id: "welcome.screen"
    timeout: 15000

# Login with seeded token first
- tapOn:
    id: "welcome.loginButton"
- tapOn:
    id: "login.tokenInput"
- inputText: "e2e-test-token-valid-00000000"
- tapOn:
    id: "login.submitButton"
- extendedWaitUntil:
    visible:
      id: "home.screen"
    timeout: 15000

# Navigate to Settings
- tapOn:
    id: "home.settingsCard"
- extendedWaitUntil:
    visible:
      id: "settings.screen"
    timeout: 10000

# Verify logged in status
- assertVisible: "已保存家庭 Token"

# Tap logout
- tapOn:
    id: "settings.logoutButton"

# Should return to Welcome screen
- extendedWaitUntil:
    visible:
      id: "welcome.screen"
    timeout: 10000
- assertVisible: "Welcome to BabyLog"
